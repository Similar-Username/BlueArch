
$mainMod = SUPER
$term = kitty
$files = thunar


bindd = CTRL ALT, Delete, exit Hyprland, exec, hyprctl dispatch exit 0

#APPS-------------------------------------------------------------------------------
bindd = $mainMod, D, app launcher, exec, rofi -show drun
bindd = $mainMod, Return, Open terminal, exec, $term
bindd = $mainMod, B, open default browser, exec, xdg-open "https://"
bindd = $mainMod, E, File manager, exec, $files
bindd = $mainMod, C, open panel, exec, bash "/home/sensei/.config/eww/scripts/calendar.sh"
bindd = $mainMod, M, open panel, exec, bash "/home/sensei/.config/eww/scripts/usrctl.sh"
bindd = $mainMod, X, AudioControl, exec, pavucontrol
bindd = $mainMod SHIFT, S, screenshot, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy



#SYSTEM COTROLS------------------------------------------------
# backlight
bindd = $mainMod, P, screenbright up, exec, brightnessctl --class=backlight s +10%
bindd = $mainMod, O, screenbright down, exec, brightnessctl --class=backlight s 10%-

# Audio
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

#Clipboard history
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy && hyprctl dispatch sendshortcut CTRL,V,



#Window Controls-------------------------------------------------------------------------------
bindd = $mainMod, Q, close active window, killactive,
bindd = $mainMod, F, fullscreen, fullscreen
bindd = $mainMod, SPACE, Float current window, togglefloating,

# Cycle windows; if floating bring to top
bindd = ALT, tab, cycle next window, cyclenext
bindd = ALT, tab, bring active to top, bringactivetotop

# Resize windows
binded = $mainMod SHIFT, left, resize left (-50), resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right (+50), resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up (-50), resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down (+50), resizeactive, 0 50

# Move windows
bindd = $mainMod CTRL, left, move window left, movewindow, l
bindd = $mainMod CTRL, right, move window right, movewindow, r
bindd = $mainMod CTRL, up, move window up, movewindow, u
bindd = $mainMod CTRL, down, move window down, movewindow, d

# Swap Windows
bindd = $mainMod CTRL SHIFT, left, swap window left, swapwindow, l
bindd = $mainMod CTRL SHIFT, right, swap window right, swapwindow, r
bindd = $mainMod CTRL SHIFT, up, swap window up, swapwindow, u
bindd = $mainMod CTRL SHIFT, down, swap window down, swapwindow, d

# move focus between windows
bindd = $mainMod ALT, left, move focus, movefocus, l
bindd = $mainMod ALT, right, move focus, movefocus, r
bindd = $mainMod ALT, up, move focus, movefocus, u
bindd = $mainMod ALT, down, move focus, movefocus, d




# Switch workspaces with CTRL + ALT + [0-9]
bindd = CTRL ALT, left, move to previous workspace, workspace, e-1
bindd = CTRL ALT, right, move to next workspace, workspace, e+1

bindd = CTRL ALT, code:10, workspace 1, workspace, 1
bindd = CTRL ALT, code:11, workspace 2, workspace, 2
bindd = CTRL ALT, code:12, workspace 3, workspace, 3
bindd = CTRL ALT, code:13, workspace 4, workspace, 4
bindd = CTRL ALT, code:14, workspace 5, workspace, 5
bindd = CTRL ALT, code:15, workspace 6, workspace, 6
bindd = CTRL ALT, code:16, workspace 7, workspace, 7
bindd = CTRL ALT, code:17, workspace 8, workspace, 8
bindd = CTRL ALT, code:18, workspace 9, workspace, 9
bindd = CTRL ALT, code:19, workspace 10, workspace, 10




# Move active window and follow to workspace mainMod + SHIFT [0-9]
bindd = CTRL ALT SHIFT, left, move to previous workspace, movetoworkspace, r-1
bindd = CTRL ALT SHIFT, right, move to next workspace, movetoworkspace, r+1

bindd = CTRL ALT SHIFT, code:10, move to workspace 1, movetoworkspace, 1
bindd = CTRL ALT SHIFT, code:11, move to workspace 2, movetoworkspace, 2
bindd = CTRL ALT SHIFT, code:12, move to workspace 3, movetoworkspace, 3
bindd = CTRL ALT SHIFT, code:13, move to workspace 4, movetoworkspace, 4
bindd = CTRL ALT SHIFT, code:14, move to workspace 5, movetoworkspace, 5
bindd = CTRL ALT SHIFT, code:15, move to workspace 6, movetoworkspace, 6
bindd = CTRL ALT SHIFT, code:16, move to workspace 7, movetoworkspace, 7
bindd = CTRL ALT SHIFT, code:17, move to workspace 8, movetoworkspace, 8
bindd = CTRL ALT SHIFT, code:18, move to workspace 9, movetoworkspace, 9
bindd = CTRL ALT SHIFT, code:19, move to workspace 10, movetoworkspace, 10


# tab through existing workspaces with mainmod + tab [shift]
bindd = $mainMod, tab, next workspace, workspace, m+1
bindd = $mainMod SHIFT, tab, previous workspace, workspace, m-1

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, next workspace, workspace, e+1
bindd = $mainMod, mouse_up, previous workspace, workspace, e-1
bindd = $mainMod, period, next workspace, workspace, e+1
bindd = $mainMod, comma, previous workspace, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = $mainMod, mouse:272, move window, movewindow # NOTE: mouse:272 = left click
bindmd = $mainMod, mouse:273, resize window, resizewindow # NOTE: mouse:272 = right click
