# BACKGROUND (blur instead of blackout)
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# TIME (bold, large, centered above input)
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = Sans Bold
    position = 0, 120
    halign = center
    valign = center
}

# DATE (optional, smaller under time)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(200, 200, 200, 0.9)
    font_size = 18
    font_family = Sans
    position = 0, 40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(255, 255, 255, 1.0)

    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>

    position = 0, -40
    halign = center
    valign = center
}
