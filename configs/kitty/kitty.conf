# ~/.config/kitty/kitty.conf
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size        9.0

# Transparency + blur base
background_opacity 0.95

# Make sure background is slightly transparent
background        #2e2e2e


# Window padding (optional, looks nicer with blur)
window_padding_width 10

# Disable window decorations (optional)
#hide_window_decorations yes

# Cursor
cursor_shape block
cursor_blink_interval 0.5
